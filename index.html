<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI产品评论分析</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 50px auto;
            background: #f5f5f5;
        }
        #comment {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            background: #0078d7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px 0;
        }
        #result {
            padding: 15px;
            background: white;
            border-radius: 6px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>讯飞AI产品 · 评论情感分析</h2>
    <textarea id="comment" placeholder="请粘贴用户评论"></textarea>
    <button onclick="checkSentiment()">开始分析</button>
    <div id="result"></div>

<script>
// 正面关键词
const goodWords = ["好用","准确","清晰","方便","智能","推荐","满意","识别快","翻译准"];
// 负面关键词
const badWords = ["卡顿","噪音","误差","难用","失望","麻烦","识别慢","耗电快"];

function checkSentiment() {
    let text = document.getElementById("comment").value;
    let good = 0;
    let bad = 0;

    // 统计关键词
    for(let w of goodWords) {
        if(text.includes(w)) good++;
    }
    for(let w of badWords) {
        if(text.includes(w)) bad++;
    }

    // 判断结果
    let sentiment = "⚪ 中性评价";
    if(good > bad) sentiment = "✅ 正面评价";
    if(bad > good) sentiment = "❌ 负面评价";

    // 展示结果
    document.getElementById("result").innerHTML = `
        <p>情感倾向：${sentiment}</p>
        <p>正面关键词：${good} 个</p>
        <p>负面关键词：${bad} 个</p>
    `;
}
</script>
</body>
</html>
