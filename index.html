<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>评论情感分析</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", system-ui, sans-serif;
    }
    body {
      background: #f8f9fc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 650px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.05);
      padding: 40px 35px;
    }
    .title {
      font-size: 26px;
      font-weight: 600;
      color: #1e293b;
      text-align: center;
      margin-bottom: 28px;
    }
    textarea {
      width: 100%;
      height: 160px;
      padding: 18px;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.6;
      color: #334155;
      resize: none;
      outline: none;
      transition: 0.2s;
    }
    textarea:focus {
      border-color: #2563eb;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }
    .analyze { background: #2563eb; color: #fff; }
    .analyze:hover { background: #1d4ed8; }
    .clear { background: #f1f5f9; color: #475569; }
    .copy { background: #10b981; color: #fff; }
    .result-box {
      margin-top: 24px;
      padding: 24px;
      background: #fafbfc;
      border-radius: 14px;
      min-height: 120px;
    }
    .result-item {
      font-size: 15px;
      color: #475569;
      margin-bottom: 10px;
    }
    .positive { color: #059669; font-weight: 600; }
    .negative { color: #dc2626; font-weight: 600; }
    .neutral { color: #64748b; font-weight: 600; }
    .keywords { color: #2563eb; font-weight: 500; }
  </style>
</head>
<body>
<div class="container">
  <h1 class="title">评论情感分析</h1>
  <textarea id="input" placeholder="请输入/粘贴用户评论（支持单字、短句、多条评论）"></textarea>
  <div class="btn-group">
    <button class="analyze" onclick="analyze()">开始分析</button>
    <button class="clear" onclick="clearAll()">清空内容</button>
    <button class="copy" onclick="copyResult()">复制结果</button>
  </div>
  <div class="result-box" id="result"></div>
</div>

<script>
// 超全情感词库
const positiveWords = [
  "好", "棒", "赞", "不错", "很好", "优秀", "完美", "满意", "推荐", "好用"
];
const negativeWords = [
  "差", "烂", "糟", "难用", "卡顿", "失望", "糟糕", "差劲", "垃圾", "麻烦"
];
// 全覆盖否定词（单字+双字，彻底解决否定句式）
const denyWords = ["不", "没", "不是", "没有", "不太", "绝不", "并非"];

// 核心：判断文本是否包含【否定词 + 情感词】组合
function hasNegativePrefix(text, word) {
  const index = text.indexOf(word);
  if (index === -1) return false;
  // 检查情感词前面是否有否定词
  for (let deny of denyWords) {
    const denyStart = index - deny.length;
    if (denyStart >= 0) {
      const substring = text.slice(denyStart, index);
      if (substring === deny) return true;
    }
  }
  return false;
}

function analyze() {
  const text = document.getElementById("input").value.trim();
  const res = document.getElementById("result");
  res.innerHTML = "";

  if (!text) {
    res.innerHTML = `<div class="result-item">请输入评论内容</div>`;
    return;
  }

  let pos = 0, neg = 0;
  let posList = [], negList = [];

  // 正向词匹配（过滤否定）
  positiveWords.forEach(word => {
    if (text.includes(word) && !hasNegativePrefix(text, word)) {
      pos++;
      posList.push(word);
    }
  });

  // 负向词匹配（过滤否定）
  negativeWords.forEach(word => {
    if (text.includes(word) && !hasNegativePrefix(text, word)) {
      neg++;
      negList.push(word);
    }
  });

  // 去重
  posList = [...new Set(posList)];
  negList = [...new Set(negList)];

  // 最终情感判断
  let sentiment = "中性评价", cls = "neutral";
  if (pos > neg) { sentiment = "正面评价"; cls = "positive"; }
  if (neg > pos) { sentiment = "负面评价"; cls = "negative"; }

  res.innerHTML = `
    <div class="result-item">情感倾向：<span class="${cls}">${sentiment}</span></div>
    <div class="result-item">正向关键词：<span class="keywords">${posList.length ? posList.join("、") : "无"}</span></div>
    <div class="result-item">负向关键词：<span class="keywords">${negList.length ? negList.join("、") : "无"}</span></div>
  `;
}

// 清空功能
function clearAll() {
  document.getElementById("input").value = "";
  document.getElementById("result").innerHTML = "";
}

// 复制结果
function copyResult() {
  const content = document.getElementById("result").innerText;
  navigator.clipboard.writeText(content);
  alert("结果已复制到剪贴板！");
}
</script>
</body>
</html>
