<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>评论情感分析</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", system-ui, sans-serif;
    }
    body {
      background-color: #f8f9fc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 620px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
      padding: 36px 32px;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 24px;
      text-align: center;
    }
    textarea {
      width: 100%;
      height: 150px;
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
      color: #374151;
      resize: none;
      outline: none;
      transition: border-color 0.2s ease;
    }
    textarea:focus {
      border-color: #3b82f6;
    }
    .analyze-btn {
      width: 100%;
      height: 48px;
      background-color: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      margin-top: 16px;
      cursor: pointer;
    }
    .analyze-btn:hover {
      background-color: #2563eb;
    }
    .result-box {
      margin-top: 24px;
      padding: 20px;
      background-color: #f9fafb;
      border-radius: 12px;
      min-height: 100px;
    }
    .result-item {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .sentiment-positive {
      color: #10b981;
      font-weight: 600;
    }
    .sentiment-negative {
      color: #ef4444;
      font-weight: 600;
    }
    .sentiment-neutral {
      color: #6b7280;
      font-weight: 600;
    }
    .keyword-tag {
      color: #3b82f6;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">评论情感分析</h1>
    <textarea id="commentText" placeholder="请粘贴用户评论内容，支持单条/多条分析"></textarea>
    <button class="analyze-btn" onclick="startAnalyze()">开始分析</button>
    <div class="result-box" id="resultArea"></div>
  </div>

  <script>
    // 正面词库（已加入：好、很好、不错等简单词）
    const positiveList = [
      "好", "很好", "不错", "好用", "准确", "清晰", "智能",
      "流畅", "便捷", "推荐", "满意", "识别快", "翻译准"
    ];

    // 负面词库
    const negativeList = [
      "差", "很差", "烂", "卡顿", "噪音", "难用", "失望",
      "识别慢", "耗电快", "麻烦", "误差大"
    ];

    // 否定词
    const denyWords = ["不", "没", "不是", "不会", "无需", "不要"];

    function startAnalyze() {
      const text = document.getElementById("commentText").value.trim();
      const resArea = document.getElementById("resultArea");
      resArea.innerHTML = "";

      if (!text) {
        resArea.innerHTML = `<div class="result-item">请输入评论内容后再分析~</div>`;
        return;
      }

      let posCount = 0;
      let negCount = 0;
      let posKeys = [];
      let negKeys = [];

      // 匹配正面
      for (let w of positiveList) {
        if (text.includes(w)) {
          // 简单判断前面有没有否定词
          const pos = text.indexOf(w);
          const hasDeny = pos > 0 && denyWords.some(d => text.slice(pos-2, pos).includes(d));
          if (!hasDeny) {
            posCount++;
            posKeys.push(w);
          }
        }
      }

      // 匹配负面
      for (let w of negativeList) {
        if (text.includes(w)) {
          const pos = text.indexOf(w);
          const hasDeny = pos > 0 && denyWords.some(d => text.slice(pos-2, pos).includes(d));
          if (!hasDeny) {
            negCount++;
            negKeys.push(w);
          }
        }
      }

      // 判断情感
      let sentiment = "中性评价";
      let sentimentClass = "sentiment-neutral";

      if (posCount > negCount) {
        sentiment = "正面评价";
        sentimentClass = "sentiment-positive";
      } else if (negCount > posCount) {
        sentiment = "负面评价";
        sentimentClass = "sentiment-negative";
      }

      resArea.innerHTML = `
        <div class="result-item">情感倾向：<span class="${sentimentClass}">${sentiment}</span></div>
        <div class="result-item">正面关键词：<span class="keyword-tag">${posKeys.length ? [...new Set(posKeys)].join("、") : "无"}</span></div>
        <div class="result-item">负面关键词：<span class="keyword-tag">${negKeys.length ? [...new Set(negKeys)].join("、") : "无"}</span></div>
      `;
    }
  </script>
</body>
</html>
