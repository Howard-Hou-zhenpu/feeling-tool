<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>评论情感分析</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
    }
    body {
      background-color: #f8f9fc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 620px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
      padding: 36px 32px;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 24px;
      text-align: center;
    }
    .input-box {
      width: 100%;
    }
    textarea {
      width: 100%;
      height: 150px;
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
      color: #374151;
      resize: none;
      outline: none;
      transition: border-color 0.2s ease;
    }
    textarea:focus {
      border-color: #3b82f6;
    }
    textarea::placeholder {
      color: #9ca3af;
    }
    .analyze-btn {
      width: 100%;
      height: 48px;
      background-color: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      margin-top: 16px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .analyze-btn:hover {
      background-color: #2563eb;
    }
    .result-box {
      margin-top: 24px;
      padding: 20px;
      background-color: #f9fafb;
      border-radius: 12px;
      min-height: 100px;
    }
    .result-item {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .sentiment-positive {
      color: #10b981;
      font-weight: 600;
    }
    .sentiment-negative {
      color: #ef4444;
      font-weight: 600;
    }
    .sentiment-neutral {
      color: #6b7280;
      font-weight: 600;
    }
    .keyword-tag {
      color: #3b82f6;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">评论情感分析</h1>
    <div class="input-box">
      <textarea id="commentText" placeholder="请粘贴用户评论内容，支持单条/多条分析"></textarea>
      <button class="analyze-btn" onclick="startAnalyze()">开始分析</button>
    </div>
    <div class="result-box" id="resultArea"></div>
  </div>

  <script>
    // 情感词库（带权重）+ 否定词过滤，分析更精准
    const positiveList = [
      { word: "好用", weight: 2 },{ word: "准确", weight: 2 },
      { word: "清晰", weight: 2 },{ word: "智能", weight: 2 },
      { word: "流畅", weight: 1.5 },{ word: "便捷", weight: 1.5 },
      { word: "推荐", weight: 1.5 },{ word: "满意", weight: 1.5 }
    ];
    const negativeList = [
      { word: "卡顿", weight: 2 },{ word: "噪音", weight: 2 },
      { word: "难用", weight: 2.5 },{ word: "失望", weight: 2 },
      { word: "识别慢", weight: 2 },{ word: "耗电快", weight: 1.5 },
      { word: "麻烦", weight: 1.5 },{ word: "误差大", weight: 2 }
    ];
    const denyWords = ["不", "没", "不是", "不会", "无需", "不要"];

    function startAnalyze() {
      const text = document.getElementById("commentText").value.trim();
      const resArea = document.getElementById("resultArea");
      if (!text) {
        resArea.innerHTML = `<div class="result-item">请输入评论内容后再分析~</div>`;
        return;
      }

      let posScore = 0, negScore = 0;
      let posKeys = [], negKeys = [];

      // 正面词检测（过滤否定）
      positiveList.forEach(item => {
        if (text.includes(item.word)) {
          const hasDeny = denyWords.some(d => {
            const idx = text.indexOf(item.word);
            return idx > 0 && text.substring(idx-2, idx).includes(d);
          });
          if (!hasDeny) {
            posScore += item.weight;
            posKeys.push(item.word);
          }
        }
      });

      // 负面词检测（过滤否定）
      negativeList.forEach(item => {
        if (text.includes(item.word)) {
          const hasDeny = denyWords.some(d => {
            const idx = text.indexOf(item.word);
            return idx > 0 && text.substring(idx-2, idx).includes(d);
          });
          if (!hasDeny) {
            negScore += item.weight;
            negKeys.push(item.word);
          }
        }
      });

      // 判断情感
      let sentiment = "中性评价", sentimentClass = "sentiment-neutral";
      if (posScore > negScore && posScore > 0) {
        sentiment = "正面评价"; sentimentClass = "sentiment-positive";
      } else if (negScore > posScore && negScore > 0) {
        sentiment = "负面评价"; sentimentClass = "sentiment-negative";
      }

      // 渲染结果
      resArea.innerHTML = `
        <div class="result-item">情感倾向：<span class="${sentimentClass}">${sentiment}</span></div>
        <div class="result-item">正面关键词：<span class="keyword-tag">${posKeys.length ? posKeys.join("、") : "无"}</span></div>
        <div class="result-item">负面关键词：<span class="keyword-tag">${negKeys.length ? negKeys.join("、") : "无"}</span></div>
      `;
    }
  </script>
</body>
</html>
